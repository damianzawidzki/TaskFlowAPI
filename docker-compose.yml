services:
  taskflowdb:
    image: postgres:16
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_DB: taskflowdb
      POSTGRES_USER: taskflowuser
      POSTGRES_PASSWORD: taskflow123
    ports:
      - "5432:5432"
    volumes:
      - taskflow_data:/var/lib/postgresql/data

volumes:
  taskflow_data: